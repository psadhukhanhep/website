    <h1>Welcome to Pradipta's Website!</h1>
    <p class="typing-container typing-effect">Number of your visit(s): <span id="visitCount">0</span></p>
    <script>
        // Check if visitCount already exists in localStorage
        if (localStorage.getItem("visitCount")) 
        {
            // Increment the visit count
            let count = parseInt(localStorage.getItem("visitCount"))+1;<!--+1--> 
            localStorage.setItem("visitCount", count);
        } 
        else 
        {
            // First visit, initialize visit count
            localStorage.setItem("visitCount", 1);
        }

        // Display the current visit count
        document.getElementById("visitCount").textContent = localStorage.getItem("visitCount");
    </script>
